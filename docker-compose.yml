
services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: playtopay
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10

  web:
    build:
      context: ./backend
    command: >
      sh -c "python manage.py migrate &&
             python manage.py seed_merchants &&
             python manage.py runserver 0.0.0.0:8000"
    environment:
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "True"
      ALLOWED_HOSTS: "*"
      DB_HOST: db
      DB_NAME: playtopay
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings
      CORS_ALLOWED_ORIGINS: http://localhost:3000
      CORS_ALLOW_ALL: "True"
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/api/v1/merchants/')\" || exit 1"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 60s
    volumes:
      - ./backend:/app

  worker:
    build:
      context: ./backend
    command: celery -A config worker --loglevel=info --concurrency=4
    environment:
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "True"
      DB_HOST: db
      DB_NAME: playtopay
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app

  beat:
    build:
      context: ./backend
    command: celery -A config beat --loglevel=info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    environment:
      SECRET_KEY: dev-secret-key-not-for-production
      DEBUG: "True"
      DB_HOST: db
      DB_NAME: playtopay
      DB_USER: postgres
      DB_PASSWORD: postgres
      DB_PORT: "5432"
      REDIS_URL: redis://redis:6379/0
      DJANGO_SETTINGS_MODULE: config.settings
    depends_on:
      web:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
      args:
        NEXT_PUBLIC_API_URL: http://localhost:8000
    ports:
      - "3000:3000"
    depends_on:
      - web

volumes:
  postgres_data:
